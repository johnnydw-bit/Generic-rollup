services:
  - type: web
    name: moths-rollup
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Paste your Neon connection string here in Render dashboard
      - key: IG_USERNAME
        sync: false
      - key: IG_PIN
        sync: false
